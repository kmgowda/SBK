url=https://play.min.io
accessKey=Q3AM3UQ867SPQQA43P2F
secretKey=zuf+tfteSlswRu7BJ86wekitnifILbZam1KYY3TG
bucketName=sbk
# AWS region for SigV4 (empty = auto-detect from endpoint)
region=
# Recreate the bucket; if already existing , delete it and create it again
reCreate=false
# No server certificate validation
insecure=true

# ---------- Object naming ----------
# Use filesystem-style hierarchical keys: a/b/c-<uuid>
fsAccess=false
# Optional object key prefix
prefix=

# ---------- Multipart upload ----------
# Part size in bytes; 0 disables multipart. Valid range: 5 MiB .. 5 GiB
partSize=0
# Concurrent parts in flight per object (0 = SDK default)
mpuConcurrentParts=0

# ---------- Checksum (crc32, crc32c, sha1, sha256, crc64nvme; empty = off) ----------
checksumAlgorithm=

# ---------- Auth (2 or 4; default 4 = SigV4) ----------
authVersion=4

# ---------- Object tagging ----------
taggingEnabled=false
# Comma-separated key=value pairs, e.g. env=prod,team=storage
taggingTags=

# ---------- Versioning ----------
versioningEnabled=false

# ---------- Data shaping ----------
# 0..100 target compressibility (0 = fully random, 100 = fully compressible)
dataCompressibility=0
# false = anti-dedup stamping every 4 KiB
dataDedupable=true

# ---------- Server-side encryption (SSE-S3) ----------
sseEnabled=false

# ---------- HTTP client timeouts (ms; 0 = SDK default) ----------
connectTimeoutMs=0
readTimeoutMs=0
writeTimeoutMs=0

# ---------- Extra HTTP headers (CSV key=value) ----------
# Added to every S3 HTTP request. Useful for backend-specific auth:
#   Dell ECS / ObjectScale: x-emc-namespace=<namespace>
#   Wasabi etc:             x-amz-content-sha256-checksum=ON
extraHeaders=
