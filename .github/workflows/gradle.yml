# This workflow will build a Java project with Gradle
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-gradle

name: SBK Java CI with Gradle

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [created]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew build
    - name: Build distribution
      run: ./gradlew installDist
    - name: Upload distribution artifacts
      uses: actions/upload-artifact@v4
      with:
        name: sbk-distribution
        path: build/install/sbk/
        retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'created'
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '25'
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build distribution
      run: ./gradlew installDist distZip distTar
    - name: Create documentation archive
      run: |
        mkdir -p docs-archive
        cp AGENTS.md docs-archive/
        cp INSTRUCTIONS.md docs-archive/
        cp README.md docs-archive/
        cp .cursorrules docs-archive/
        cp .aider.conf.yml docs-archive/
        cp -r docs docs-archive/
        cp -r .devin/skills docs-archive/
        cd docs-archive
        tar -czf ../sbk-agent-docs.tar.gz *
    - name: Upload release assets
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/distributions/*.zip
          build/distributions/*.tar
          sbk-agent-docs.tar.gz
          AGENTS.md
          INSTRUCTIONS.md
          docs/AGENT_RECIPES.md
          docs/DRIVER_SPECIFICATION.md
          docs/AGENT_TOOLKIT.md
          docs/AGENT_DOCUMENTATION_DISTRIBUTION.md
          docs/sbk-internals.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
